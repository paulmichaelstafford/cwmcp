# cwmcp configuration
# Copy to ~/.cwmcp/config.properties and fill in your values

# cwbe service account credentials
cwbe_user=your-email@example.com
cwbe_password=your-password

# Swagger UI credentials (for browsing cwbe endpoints)
swagger_user=your-swagger-username
swagger_password=your-swagger-password

# ElevenLabs API key (optional, no longer required)
# elevenlabs_api_key=your-api-key

# cwtts service URL for TTS audio generation
cwtts_url=http://localhost:8100

# TTS API keys (passed to cwtts Docker container)
mistral_api_key=your-mistral-api-key
fish_audio_api_key=your-fish-audio-api-key

# Path to directory containing onetime/ and continuous/ book folders
content_path=/path/to/your/audio/content
